name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  make:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            label: Windows x64
            artifact: simple-metronome-windows-x64
          - os: macos-latest
            arch: x64
            label: macOS Intel
            artifact: simple-metronome-macos-x64
          - os: macos-latest
            arch: arm64
            label: macOS Apple Silicon
            artifact: simple-metronome-macos-arm64
          - os: ubuntu-latest
            arch: x64
            label: Linux x64
            artifact: simple-metronome-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends fakeroot dpkg zip

      - name: Install dependencies
        run: npm ci

      - name: Build desktop packages
        run: npm run desktop:make -- --arch=${{ matrix.arch }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/make/**/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: make
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download desktop packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' files < <(find artifacts -type f -print0)
          gh release create "$GITHUB_REF_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --generate-notes --title "Simple Metronome $GITHUB_REF_NAME"
